services:
  backend:
    build:
      context: .
      dockerfile: deploy/Dockerfile.dev
    volumes:
      - ./backend:/app
    ports:
      - "8080:8080"
    env_file: ./backend/.env

  portal:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter portal dev --host 0.0.0.0"
    volumes:
      - .:/app
      - portal_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  budget:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-budget dev --host 0.0.0.0"
    volumes:
      - .:/app
      - budget_node_modules:/app/node_modules
    ports:
      - "5174:5174"
    depends_on:
      - backend

  compliance:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-compliance dev --host 0.0.0.0"
    volumes:
      - .:/app
      - compliance_node_modules:/app/node_modules
    ports:
      - "5175:5175"
    depends_on:
      - backend

  kit-products:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-kit-products dev --host 0.0.0.0"
    volumes:
      - .:/app
      - kit_products_node_modules:/app/node_modules
    environment:
      - VITE_DEV_BACKEND_URL=http://backend:8080
    ports:
      - "5176:5176"
    depends_on:
      - backend

  listini-e-sconti:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-listini-e-sconti dev --host 0.0.0.0"
