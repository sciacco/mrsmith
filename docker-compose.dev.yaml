      - listini_node_modules:/app/node_modules
    environment:
      - VITE_DEV_BACKEND_URL=http://backend:8080
    ports:
      - "5177:5177"
    depends_on:
      - backend

  panoramica-cliente:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-panoramica-cliente dev --host 0.0.0.0"
    volumes:
      - .:/app
      - panoramica_node_modules:/app/node_modules
    environment:
      - VITE_DEV_BACKEND_URL=http://backend:8080
    ports:
      - "5178:5178"
    depends_on:
      - backend

  quotes:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-quotes dev --host 0.0.0.0"
    volumes:
      - .:/app
      - quotes_node_modules:/app/node_modules
    environment:
      - VITE_DEV_BACKEND_URL=http://backend:8080
    ports:
      - "5179:5179"
    depends_on:
      - backend

  coperture:
    image: node:20-slim
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm --filter mrsmith-coperture dev --host 0.0.0.0"
    volumes:
      - .:/app
      - coperture_node_modules:/app/node_modules
    environment:
      - VITE_DEV_BACKEND_URL=http://backend:8080
    ports:
      - "5183:5183"
    depends_on:
      - backend

  energia-dc:
    image: node:20-slim
    working_dir: /app
