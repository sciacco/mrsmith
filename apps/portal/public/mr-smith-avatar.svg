<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="58" fill="#1a2a1a" stroke="#00ff41" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Suit/shoulders -->
  <path d="M20 110 Q20 85 40 78 L50 74 L60 80 L70 74 L80 78 Q100 85 100 110" fill="#1a1a1a" stroke="#2a2a2a" stroke-width="0.5"/>

  <!-- Shirt collar -->
  <path d="M52 74 L60 82 L68 74" fill="none" stroke="#e8e8e8" stroke-width="1.5"/>

  <!-- Tie -->
  <path d="M60 78 L57 95 L60 110 L63 95 Z" fill="#1a1a1a" stroke="#333" stroke-width="0.5"/>
  <path d="M56 76 L60 80 L64 76" fill="#333" stroke="#444" stroke-width="0.5"/>

  <!-- Neck -->
  <rect x="54" y="62" width="12" height="14" rx="4" fill="#c8a882"/>

  <!-- Head -->
  <ellipse cx="60" cy="45" rx="22" ry="26" fill="#d4b896"/>

  <!-- Hair -->
  <path d="M38 38 Q38 20 60 18 Q82 20 82 38 L82 34 Q80 22 60 20 Q40 22 38 34 Z" fill="#2a2218"/>
  <path d="M36 42 Q36 28 42 24" fill="none" stroke="#2a2218" stroke-width="3"/>
  <path d="M84 42 Q84 28 78 24" fill="none" stroke="#2a2218" stroke-width="3"/>

  <!-- Ears -->
  <ellipse cx="38" cy="46" rx="4" ry="6" fill="#c8a882"/>
  <ellipse cx="82" cy="46" rx="4" ry="6" fill="#c8a882"/>

  <!-- Sunglasses -->
  <rect x="41" y="38" width="15" height="10" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="64" y="38" width="15" height="10" rx="2" fill="#111" stroke="#333" stroke-width="1"/>
  <path d="M56 42 Q60 38 64 42" stroke="#333" stroke-width="1" fill="none"/>
  <line x1="41" y1="40" x2="38" y2="38" stroke="#333" stroke-width="1"/>
  <line x1="79" y1="40" x2="82" y2="38" stroke="#333" stroke-width="1"/>

  <!-- Sunglasses reflection -->
  <rect x="43" y="40" width="4" height="2" rx="0.5" fill="#1a3a1a" opacity="0.4"/>
  <rect x="66" y="40" width="4" height="2" rx="0.5" fill="#1a3a1a" opacity="0.4"/>

  <!-- Nose -->
  <path d="M60 48 L58 54 L62 54" fill="none" stroke="#b8956e" stroke-width="1" stroke-linecap="round"/>

  <!-- Mouth -->
  <path d="M53 60 Q60 62 67 60" fill="none" stroke="#8a6e52" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Eyebrows -->
  <path d="M42 36 Q48 33 56 35" fill="none" stroke="#2a2218" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M64 35 Q72 33 78 36" fill="none" stroke="#2a2218" stroke-width="1.8" stroke-linecap="round"/>
</svg>
