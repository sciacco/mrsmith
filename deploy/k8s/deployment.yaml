apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrsmith
  labels:
    app: mrsmith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mrsmith
  template:
    metadata:
      labels:
        app: mrsmith
    spec:
      containers:
        - name: mrsmith
          image: mrsmith:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mrsmith-config
          env:
            - name: ANISETTA_DSN
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: ANISETTA_DSN
                  optional: true
            - name: MISTRA_DSN
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: MISTRA_DSN
                  optional: false
            - name: ALYANTE_DSN
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: ALYANTE_DSN
                  optional: true
            - name: GRAPPA_DSN
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: GRAPPA_DSN
                  optional: false
            - name: HUBSPOT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: HUBSPOT_API_KEY
                  optional: true
            - name: CARBONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mrsmith-secrets
                  key: CARBONE_API_KEY
                  optional: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
