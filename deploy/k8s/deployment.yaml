apiVersion: apps/v1
kind: Deployment
metadata:
  name: mrsmith
  labels:
    app: mrsmith
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mrsmith
  template:
    metadata:
      labels:
        app: mrsmith
    spec:
      containers:
        - name: mrsmith
          image: mrsmith:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: mrsmith-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
