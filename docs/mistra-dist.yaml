openapi: 3.0.9
info:
  version: 2.7.14
  title: Mistra NG Internal API
  license:
    name: CDLAN
    url: https://www.cdlan.it
  description: |
    # Mistra NG Internal API Reference Build: 2.7.14
servers:
  - url: /
security:
  - oauth2:
      - openid
      - profile
tags:
  - name: base
    description: basic calls
  - name: users
    description: module that handles authorization and permissions
  - name: net-coverages
    description: endpoints for checking internet coverages in places
  - name: products
    description: endpoints for product management
  - name: temp
    description: temporary calls, not stable across updates
  - name: customers/v1
    description: backport for gw-int v1 customers requests
  - name: customers
    description: customers endpoints
  - name: orders
    description: endpoint for orders management
  - name: arak-users-int
    description: endpoints to manage arak's internal users
  - name: arak-budget
    description: endpoints to manage arak's budgets
  - name: arak-provider-qualification
    description: endpoints to manage arak's provider qualifications
  - name: arak-rda
    description: endpoints to manage arak's Purchase requests
  - name: files
    description: endpoints to manage files
paths:
  /users/v2/user:
    get:
      summary: get all users
      operationId: getAllUser
      description: Returns a list of all users
      tags:
        - users
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: customer_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: role_id
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: include_kc_info
          description: if true returns also some information from keycloak (last_login)
          in: query
          required: false
          schema:
            type: boolean
        - name: search_string
          in: query
          required: false
          description: return users that contain in their first_name, last_name or email the search string
          schema:
            type: string
      responses:
        '200':
          description: successfully retrieved
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/user-brief'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: create new user
      operationId: NewUser
      description: Create a new user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/user-new'
      responses:
        '200':
          description: Successfully created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id-object'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/admin:
    post:
      summary: create new admin user
      operationId: NewAdminUser
      description: Create a new admin user
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/user-admin-new'
      responses:
        '200':
          description: Successfully created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id-object'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/user/{userId}:
    put:
      summary: update users
      operationId: UpdateUser
      description: Update User
      tags:
        - users
      parameters:
        - name: userId
          in: path
          description: user's id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/user-edit'
      responses:
        '200':
          description: Successfully updated User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    delete:
      summary: delete user
      operationId: deleteUser
      description: Delete User
      tags:
        - users
      parameters:
        - name: userId
          in: path
          description: user's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully deleted User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    get:
      summary: get user details
      operationId: GetUserDetails
      description: Get User
      tags:
        - users
      parameters:
        - name: userId
          in: path
          description: user's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully got User info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/user/{userId}/enable:
    post:
      summary: enable users
      operationId: enableUser
      description: Enable User
      tags:
        - users
      parameters:
        - name: userId
          in: path
          description: user's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully enabled User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/user/{userId}/disable:
    post:
      summary: disable users
      operationId: disableUser
      description: Disable User
      tags:
        - users
      parameters:
        - name: userId
          in: path
          description: user's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully disabled User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/my-data:
    get:
      summary: get user perms and info
      operationId: getMyData
      description: Get all infos and permissions for user
      tags:
        - users
      parameters:
        - name: email
          in: query
          description: user's email
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/my-data'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/role:
    get:
      summary: get all roles
      operationId: GetAllRoles
      description: Returns a list of all roles
      tags:
        - users
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: customer_id
          in: query
          required: false
          description: shows only roles created by selected customer (no default)
          schema:
            type: integer
            format: int64
        - name: search_string
          in: query
          required: false
          description: return roles that contain in their name the search string
          schema:
            type: string
      responses:
        '200':
          description: Successfully retrieved list
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/role'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: create new role
      operationId: NewRole
      description: Create a new role
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/role-new'
      responses:
        '200':
          description: Successfully created Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id-object'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/role/{roleId}:
    put:
      summary: edit role
      operationId: EditRole
      tags:
        - users
      parameters:
        - name: roleId
          in: path
          description: role's id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/role-edit'
      responses:
        '200':
          description: Successfully updated Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    delete:
      summary: delete role
      operationId: DeleteRole
      tags:
        - users
      parameters:
        - name: roleId
          in: path
          description: role's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully deleted Role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
    get:
      summary: get role info
      operationId: GetRoleDetails
      tags:
        - users
      parameters:
        - name: roleId
          in: path
          description: role's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully got Role info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/role'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/role/{roleId}/users:
    get:
      summary: get all users for role
      operationId: GetAllUsersByRole
      description: Returns a list of all users of my company with given role
      tags:
        - users
      parameters:
        - name: roleId
          in: path
          description: role's id
          required: true
          schema:
            type: integer
            format: int64
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Successfully retrieved list
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/user-brief'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: bulk-add users to role
      operationId: BulkAddUsersToRole
      tags:
        - users
      parameters:
        - name: roleId
          in: path
          description: role's id
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                users:
                  type: array
                  description: array of user's ids
                  items:
                    type: integer
                    format: int64
              required:
                - users
      responses:
        '200':
          description: Successfully added users to role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/page:
    post:
      summary: create new page
      operationId: NewPage
      description: Create a new page
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/page'
      responses:
        '200':
          description: Successfully created Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    get:
      summary: get all pages
      operationId: GetAllPages
      description: Returns a list of all pages available
      tags:
        - users
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: selectable_only_by_cdlan
          in: query
          required: false
          description: shows only pages that are selectable only by cdlan
          schema:
            type: boolean
        - name: search_string
          in: query
          required: false
          description: return pages that contain the search string
          schema:
            type: string
        - name: available_to_cg
          in: query
          required: false
          description: return pages that are available to selected customer group
          schema:
            type: integer
            format: int64
        - name: available_to_customer_id
          in: query
          required: false
          description: return pages that are available for specific customer (using this ignores the value of available_to_cg)
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved list
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/page'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    put:
      summary: edit page
      operationId: EditPage
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/page-edit'
      responses:
        '200':
          description: Successfully updated Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/page/{pageName}:
    delete:
      summary: delete page
      operationId: DeletePage
      tags:
        - users
      parameters:
        - name: pageName
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Successfully deleted Page
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/path:
    get:
      summary: get all api-path
      operationId: getAllApiPaths
      description: Returns a list of all api-paths
      tags:
        - users
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: search_string
          in: query
          required: false
          description: return pages that contain the search string
          schema:
            type: string
      responses:
        '200':
          description: successfully retrieved
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/api-path'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
    post:
      summary: create new api-path
      operationId: NewApiPath
      description: Create a new api-path
      tags:
        - users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/api-path-new'
      responses:
        '200':
          description: Successfully created user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/id-object'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/path/seed:
    post:
      summary: seed assenzio paths
      operationId: SeedExtPaths
      description: Adds all the pages from the openapi of the external gw (this version) to the path DB
      tags:
        - users
      responses:
        '200':
          description: seeded DB
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/message'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /users/v2/variable:
    get:
      summary: get all variables
      operationId: getAllVariables
      description: Returns a list of all variables
      tags:
        - users
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: search_string
          in: query
          required: false
          description: return variables that contain the search string
          schema:
            type: string
      responses:
        '200':
          description: successfully retrieved
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/variable'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /customers/v1/customer:
    get:
      summary: get all customers (v1)
      operationId: GetAllCustomersV1
      description: Returns a list of all customers
      tags:
        - customers/v1
      parameters:
        - name: index
          in: query
          required: false
          description: Current pagination index requested (ignored if page_size is -1).
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page_size
          in: query
          required: false
          description: Number of records to be included in one page. Set to -1 to return all customers in a single response without pagination.
          schema:
            type: integer
            minimum: -1
            default: 20
      responses:
        '200':
          description: Successfully retrieved list
          content:
            application/json:
              schema:
                type: object
                required:
                  - index
                  - customers
                properties:
                  customers:
                    type: array
                    items:
                      $ref: '#/components/schemas/customer-v1'
                  index:
                    type: object
                    required:
                      - current
                      - total
                    properties:
                      current:
                        type: integer
                      total:
                        type: integer
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
        '500':
          $ref: '#/components/responses/500'
  /customers/v1/customer/{customerId}/maintenance-email:
    get:
      summary: get email that receive maintenance notification for a given customer
      operationId: GetCustomerMaintenanceEmail
      tags:
        - customers/v1
      parameters:
        - name: customerId
          in: path
          description: customer's id
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully got email list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/maintenance-contact'
        '403':
          $ref: '#/components/responses/403'
        '404':
          $ref: '#/components/responses/404'
        '500':
          $ref: '#/components/responses/500'
  /customers/v2/customer:
    get:
      summary: get all customers
      operationId: GetAllCustomers
      description: Returns a list of all customers
      tags:
        - customers
      parameters:
        - name: page_number
          in: query
          required: true
          schema:
            type: integer
        - name: disable_pagination
          in: query
          required: false
          description: provides all results in a single page
          schema:
            type: boolean
        - name: search_string
          in: query
          required: false
          description: return customers whose name contains the search string
          schema:
            type: string
        - name: customer_group_id
          in: query
          required: false
          description: return customers with given customer_group
          schema:
            type: integer
            format: int64
        - name: state_id
          in: query
          required: false
          description: return customers with given state
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved list
          content:
            application/json:
              schema:
                type: object
                required:
                  - total_number
                  - current_page
                  - total_pages
                  - items
                properties:
                  total_number:
                    type: integer
                  current_page:
                    type: integer
                  total_pages:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/customer'
        '400':
          $ref: '#/components/responses/400'
        '403':
          $ref: '#/components/responses/403'
