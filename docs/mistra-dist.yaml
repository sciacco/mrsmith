        paths:
          type: array
          items:
            $ref: '#/components/schemas/api-path-new'
        available_to_cg:
          type: array
          items:
            type: integer
            format: int64
        auto_add:
          type: boolean
      required:
        - name
        - selectable_only_by_cdlan
        - paths
        - available_to_cg
        - auto_add
    role:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        pages:
          type: array
          items:
            $ref: '#/components/schemas/page'
        color:
          type: string
          minLength: 6
          maxLength: 6
          description: hex color
        customer_id:
          type: integer
          format: int64
        user_count:
          type: integer
      required:
        - id
        - name
        - pages
        - user_count
    user-state:
      type: object
      required:
        - id
        - name
        - enabled
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        enabled:
