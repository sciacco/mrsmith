  responses:
    '200':
      description: Ok
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: text description
    '400':
      description: Bad request
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: text description
    '403':
      description: User is not authorized to this endpoint
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: text description
          example:
            message: Forbidden
    '404':
      description: Resource Not Found
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: text description
          example:
            message: Resource not found
    '500':
      description: Internal Server Error
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
                description: text description
          example:
            message: Internal server error
