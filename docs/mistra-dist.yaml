components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        implicit:
          authorizationUrl: https://nemo.cub-otto.it/realms/cdlan/protocol/openid-connect/auth
          scopes:
            openid: openid
            profile: profile
    basic:
      type: http
      scheme: basic
  schemas:
    role-brief:
      type: object
      description: User Group
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        color:
          type: string
          minLength: 7
          maxLength: 7
          description: hex color for group
      required:
        - id
        - name
        - color
    user-brief:
      type: object
      description: User Data
      required:
        - id
        - customer_id
        - first_name
        - last_name
        - email
        - enabled
        - role
        - created
      properties:
        id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/role-brief'
        phone:
          type: string
        enabled:
          type: boolean
        created:
          type: string
        last_login:
          type: string
    contact-new:
      type: object
      required:
        - type
        - name
        - value
      properties:
        type:
          type: string
          enum:
            - secondary_email
            - phone
        name:
          type: string
        value:
          type: string
        maintenance_notification:
          type: boolean
          default: false
        marketing_notification:
          type: boolean
          default: false
    user-new:
      type: object
      description: User Data
      required:
        - first_name
        - last_name
        - email
        - role_id
        - customer_id
        - phone
        - maintenance_on_primary_email
        - marketing_on_primary_email
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          description: '**Warning**: cannot be changed'
        role_id:
          type: integer
          format: int64
        customer_id:
          type: integer
          format: int64
        phone:
          type: string
        maintenance_on_primary_email:
          type: boolean
        marketing_on_primary_email:
          type: boolean
        state:
          type: string
          enum:
            - active
            - admin_disabled
            - company_disabled
        contacts:
          type: array
          items:
            $ref: '#/components/schemas/contact-new'
        skip_keycloak:
          type: boolean
          description: if true, the system will not create the user in keycloak
    id-object:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          format: int64
    user-admin-new:
      type: object
      description: User Data
      required:
        - first_name
        - last_name
        - email
        - customer_id
        - phone
        - maintenance_on_primary_email
        - marketing_on_primary_email
      properties:
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
          description: '**Warning**: cannot be changed'
        customer_id:
          type: integer
          format: int64
        phone:
          type: string
        maintenance_on_primary_email:
          type: boolean
        marketing_on_primary_email:
          type: boolean
        skip_keycloak:
          type: boolean
          description: if true, the system will not create the user in keycloak
        biometric:
          type: boolean
          description: if true, trigger a biometric activatction request
          default: false
    variable:
      type: object
      required:
        - resource
        - access_type
      properties:
        resource:
          type: string
        access_type:
          type: string
    customer-group:
      type: object
      required:
        - id
        - name
        - is_default
        - is_partner
        - variables
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        is_default:
          type: boolean
        is_partner:
          type: boolean
        variables:
          type: array
          items:
            $ref: '#/components/schemas/variable'
    customer-state:
      type: object
      required:
        - id
        - name
        - enabled
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        enabled:
          type: boolean
    customer:
      type: object
      required:
        - id
        - name
        - group
        - state
        - variables
        - language
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        group:
          $ref: '#/components/schemas/customer-group'
        state:
          $ref: '#/components/schemas/customer-state'
        variables:
          type: array
          items:
            $ref: '#/components/schemas/variable'
        language:
          type: string
          enum:
            - it
            - en
    api-path-new:
      type: object
      required:
        - path
